
<div id="wrap" style="position:relative;width:100%;">
  <svg id="net-svg" width="100%" style="display:block;"></svg>
  <div id="tip" style="position:absolute;pointer-events:none;opacity:0;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:8px 12px;font-size:12px;line-height:1.6;color:var(--color-text-primary);max-width:200px;z-index:10;transition:opacity .12s;"></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:10px 20px;margin:14px 0 0;font-size:11px;color:var(--color-text-secondary);">
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#F5C4B3;border:1px solid #993C1D;flex-shrink:0;"></span>Lei / Condenação</span>
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#FAC775;border:1px solid #BA7517;flex-shrink:0;"></span>Desejo / Psique</span>
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#9FE1CB;border:1px solid #0F6E56;flex-shrink:0;"></span>Graça / Liberdade</span>
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#B5D4F4;border:1px solid #185FA5;flex-shrink:0;"></span>Teologia / Tempo</span>
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:50%;background:#CECBF6;border:1px solid #534AB7;flex-shrink:0;"></span>Identidade / Narrativa</span>
  <span style="display:flex;align-items:center;gap:5px;font-style:italic;">Passe o cursor sobre um nó para ver as conexões</span>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const chapters = [
  { id:1, tags:['lei','desejo','falta','adão-perf.','ordem-simb.','proibição','morte'] },
  { id:2, tags:['lei','satanás','acusação','transgressão','moralismo','voz-obscena','morte'] },
  { id:3, tags:['vergonha','teatro','moralismo','adão-perf.','lei','graça','hipocrisia'] },
  { id:4, tags:['tipologia','cristologia','aliança','graça','cruz','sacrifício','lei'] },
  { id:5, tags:['chronos','kairós','retroatividade','cristologia','graça','salvação','eternidade'] },
  { id:6, tags:['cosmologia','cruz','graça','kairós','corpo-de-cristo','ateísmo-cristão','indiferença'] },
  { id:7, tags:['fantasia','desejo','adão-real','indiferença','identidade','graça','adão-perf.'] },
  { id:8, tags:['sábado-eterno','graça','identidade','salvação','liberdade','silêncio','consumado'] }
];

const fullNames = {
  'adão-perf.': 'adão-performativo', 'ordem-simb.': 'ordem-simbólica',
  'teatro': 'teatro-da-moralidade', 'corpo-de-cristo': 'corpo-de-cristo',
  'ateísmo-cristão': 'ateísmo-cristão', 'indiferença': 'indiferença-santa',
  'sábado-eterno': 'sábado-eterno', 'voz-obscena': 'voz-obscena'
};

const cats = {
  lei:'coral', morte:'coral', satanás:'coral', acusação:'coral', transgressão:'coral', proibição:'coral',
  desejo:'amber', fantasia:'amber', falta:'amber', 'voz-obscena':'amber', 'adão-perf.':'amber',
  vergonha:'amber', hipocrisia:'amber', 'ordem-simb.':'amber',
  graça:'teal', indiferença:'teal', 'sábado-eterno':'teal', liberdade:'teal', consumado:'teal', silêncio:'teal',
  chronos:'blue', kairós:'blue', retroatividade:'blue', eternidade:'blue', cristologia:'blue',
  salvação:'blue', 'corpo-de-cristo':'blue', 'ateísmo-cristão':'blue', cosmologia:'blue',
  identidade:'purple', 'adão-real':'purple', teatro:'purple', moralismo:'purple',
  aliança:'purple', tipologia:'purple', sacrifício:'purple', cruz:'purple'
};

const palette = {
  coral:{ fill:'#F5C4B3', stroke:'#993C1D', text:'#4A1B0C' },
  amber:{ fill:'#FAC775', stroke:'#BA7517', text:'#412402' },
  teal: { fill:'#9FE1CB', stroke:'#0F6E56', text:'#04342C' },
  blue: { fill:'#B5D4F4', stroke:'#185FA5', text:'#042C53' },
  purple:{ fill:'#CECBF6', stroke:'#534AB7', text:'#26215C' },
  gray: { fill:'#D3D1C7', stroke:'#5F5E5A', text:'#2C2C2A' }
};

const tagMap = {};
chapters.forEach(ch => ch.tags.forEach(t => {
  if (!tagMap[t]) tagMap[t] = { id:t, chapters:[], count:0, category: cats[t]||'gray' };
  tagMap[t].chapters.push(ch.id); tagMap[t].count++;
}));
const nodes = Object.values(tagMap);

const edgeMap = {};
chapters.forEach(ch => {
  for (let i=0;i<ch.tags.length;i++) for (let j=i+1;j<ch.tags.length;j++) {
    const k = [ch.tags[i],ch.tags[j]].sort().join('|||');
    if (!edgeMap[k]) edgeMap[k] = {source:ch.tags[i], target:ch.tags[j], weight:0, chapters:[]};
    edgeMap[k].weight++; edgeMap[k].chapters.push(ch.id);
  }
});
const links = Object.values(edgeMap);

const W = 680, H = 560;
const svg = d3.select('#net-svg').attr('viewBox',`0 0 ${W} ${H}`);

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(d => Math.max(30, 80 - d.weight*14)).strength(0.35))
  .force('charge', d3.forceManyBody().strength(d => -80 - d.count*30))
  .force('center', d3.forceCenter(W/2, H/2).strength(0.08))
  .force('collide', d3.forceCollide().radius(d => 14 + d.count*5 + 10).strength(0.7))
  .force('x', d3.forceX(W/2).strength(0.04))
  .force('y', d3.forceY(H/2).strength(0.04));

const linkEl = svg.append('g').selectAll('line').data(links).join('line')
  .attr('stroke','#B4B2A9').attr('stroke-opacity', d => 0.08 + d.weight*0.05)
  .attr('stroke-width', d => 0.4 + d.weight*0.35);

const nodeEl = svg.append('g').selectAll('g').data(nodes).join('g')
  .attr('cursor','pointer')
  .call(d3.drag()
    .on('start',(ev,d)=>{ if(!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',(ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
    .on('end',(ev,d)=>{ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  );

nodeEl.append('circle')
  .attr('r', d => 7 + d.count*4)
  .attr('fill', d => palette[d.category].fill)
  .attr('stroke', d => palette[d.category].stroke)
  .attr('stroke-width', d => d.count > 3 ? 1.5 : 0.8);

nodeEl.append('text')
  .attr('text-anchor','middle')
  .attr('dy', d => 10 + d.count*4)
  .attr('font-family','"Anthropic Sans",sans-serif')
  .attr('font-size','9')
  .attr('fill', d => palette[d.category].text)
  .attr('font-weight', d => d.count >= 3 ? '500' : '400')
  .text(d => d.id);

const tip = d3.select('#tip');

nodeEl.on('mouseenter', function(ev, d) {
  const full = fullNames[d.id] || d.id;
  const capLabel = d.chapters.length > 1 ? `Caps. ${d.chapters.join(', ')}` : `Cap. ${d.chapters[0]}`;
  tip.style('opacity',1)
    .html(`<span style="font-weight:500">#${full}</span><br><span style="color:var(--color-text-secondary)">${capLabel}</span><br><span style="color:var(--color-text-secondary)">Conexões: ${links.filter(l=>l.source.id===d.id||l.target.id===d.id).length}</span>`)
    .style('left', (ev.offsetX + 14)+'px')
    .style('top', (ev.offsetY - 14)+'px');
  const col = palette[d.category].stroke;
  linkEl
    .attr('stroke', l => (l.source.id===d.id||l.target.id===d.id) ? col : '#B4B2A9')
    .attr('stroke-opacity', l => (l.source.id===d.id||l.target.id===d.id) ? 0.75 : 0.04)
    .attr('stroke-width', l => (l.source.id===d.id||l.target.id===d.id) ? 1.2 + l.weight*0.3 : 0.3);
  nodeEl.select('circle').attr('opacity', n => {
    if(n.id===d.id) return 1;
    const conn = links.find(l=>(l.source.id===d.id&&l.target.id===n.id)||(l.target.id===d.id&&l.source.id===n.id));
    return conn ? 1 : 0.3;
  });
  nodeEl.select('text').attr('opacity', n => {
    if(n.id===d.id) return 1;
    const conn = links.find(l=>(l.source.id===d.id&&l.target.id===n.id)||(l.target.id===d.id&&l.source.id===n.id));
    return conn ? 1 : 0.25;
  });
})
.on('mousemove', ev => tip.style('left',(ev.offsetX+14)+'px').style('top',(ev.offsetY-14)+'px'))
.on('mouseleave', () => {
  tip.style('opacity',0);
  linkEl.attr('stroke','#B4B2A9').attr('stroke-opacity', d=>0.08+d.weight*0.05).attr('stroke-width', d=>0.4+d.weight*0.35);
  nodeEl.select('circle').attr('opacity',1);
  nodeEl.select('text').attr('opacity',1);
});

sim.on('tick', () => {
  nodes.forEach(d => { d.x=Math.max(30,Math.min(W-30,d.x)); d.y=Math.max(30,Math.min(H-30,d.y)); });
  linkEl.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeEl.attr('transform',d=>`translate(${d.x},${d.y})`);
});
</script>
